<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IndukShop - Belanja Muda, Bangga Indonesia</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .hero-bg { background: linear-gradient(90deg, #0033A0, #CE1126); }
    .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .card-hover:hover { transform: translateY(-8px); box-shadow: 0 25px 50px -12px rgb(0 51 160 / 0.25); }
  </style>
</head>
<body class="bg-white text-gray-900">

  <!-- Navbar -->
  <nav class="bg-[#0033A0] text-white sticky top-0 z-50 shadow-lg">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3 text-2xl font-bold">
        <span class="text-3xl">🛒</span> IndukShop
      </div>
      <div class="flex-1 max-w-xl mx-8">
        <input id="searchInput" type="text" placeholder="Cari produk atau etalase..." 
               class="w-full px-6 py-3 rounded-2xl bg-white/10 text-white placeholder:text-white/70 focus:outline-none focus:bg-white/20 text-base">
      </div>
      <div class="flex items-center gap-6 text-xl">
        <button onclick="toggleCart()" class="relative">
          <i class="fa-solid fa-cart-shopping"></i>
          <span id="cartCount" class="absolute -top-1 -right-1 bg-[#CE1126] text-[10px] rounded-full h-5 w-5 flex items-center justify-center">0</span>
        </button>
        <button onclick="showProfile()" class="flex items-center gap-2 hover:scale-110 transition">
          <i class="fa-solid fa-circle-user text-2xl"></i> 
          <span id="userName" class="text-sm font-medium">Login</span>
        </button>
        <button onclick="showAdminPanel()" class="hidden bg-white text-[#0033A0] px-6 py-2.5 rounded-3xl font-semibold text-sm flex items-center gap-2" id="adminBtn">
          👷‍♂️ Admin Etalase
        </button>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <header class="hero-bg text-white py-20">
    <div class="max-w-7xl mx-auto px-6 text-center">
      <h1 class="text-6xl font-bold mb-4 leading-tight">Belanja Muda.<br>Bangga Indonesia.</h1>
      <p class="text-2xl mb-10 opacity-90">Etalase keren dari Induk Perusahaan • Gratis ongkir • Cashback Gen Z</p>
      <button onclick="document.getElementById('productsSection').scrollIntoView({behavior:'smooth'})" 
              class="bg-white text-[#CE1126] font-bold px-12 py-5 rounded-3xl text-2xl hover:scale-105 transition shadow-xl">
        Belanja Sekarang →
      </button>
    </div>
  </header>

  <!-- Etalase -->
  <section class="max-w-7xl mx-auto px-6 py-12">
    <h2 class="text-4xl font-bold mb-8">Etalase Terbaru</h2>
    <div id="etalaseGrid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
  </section>

  <!-- Products -->
  <section id="productsSection" class="max-w-7xl mx-auto px-6 py-12 bg-gray-50">
    <div class="flex justify-between items-center mb-8">
      <h2 class="text-4xl font-bold">Produk Unggulan</h2>
      <select id="categoryFilter" onchange="filterProducts()" class="px-6 py-3 rounded-3xl border border-gray-300 text-base">
        <option value="">Semua Kategori</option>
      </select>
    </div>
    <div id="productGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6"></div>
  </section>

  <!-- Footer + Aduan WA -->
  <footer class="bg-[#0033A0] text-white py-16">
    <div class="max-w-7xl mx-auto px-6 text-center">
      <p class="text-3xl mb-6">Ada masalah dengan pesananmu?</p>
      <button onclick="kirimAduanWhatsApp()" 
              class="bg-[#CE1126] hover:bg-red-700 px-10 py-6 rounded-3xl text-2xl font-bold inline-flex items-center gap-4 shadow-xl">
        <i class="fa-brands fa-whatsapp text-4xl"></i> 
        KIRIM ADUAN KE WHATSAPP ADMIN
      </button>
      <p class="mt-12 text-sm opacity-75">© 2026 IndukShop • Dibuat khusus untuk Gen Z Indonesia</p>
    </div>
  </footer>

  <!-- Cart Modal -->
  <div id="cartModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[9999]">
    <div class="bg-white rounded-3xl max-w-md w-full mx-4 p-8">
      <h3 class="text-3xl font-bold mb-6">Keranjang Belanja</h3>
      <div id="cartItems" class="max-h-96 overflow-auto"></div>
      <div class="border-t pt-6 mt-6 flex justify-between text-xl font-semibold">
        <span>Total</span>
        <span id="cartTotal">Rp 0</span>
      </div>
      <button onclick="checkout()" class="w-full mt-6 bg-[#0033A0] text-white py-5 rounded-3xl font-bold text-xl">Lanjut ke Checkout</button>
      <button onclick="toggleCart()" class="w-full mt-3 text-gray-500">Tutup</button>
    </div>
  </div>

  <!-- Admin Modal -->
  <div id="adminModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[9999]">
    <div class="bg-white rounded-3xl max-w-lg w-full mx-4 p-8">
      <h2 class="text-3xl font-bold mb-6">Buat Etalase Baru</h2>
      <input id="etalaseName" placeholder="Nama Etalase" class="w-full mb-4 px-6 py-4 border rounded-3xl text-lg">
      <textarea id="etalaseDesc" placeholder="Deskripsi singkat" class="w-full mb-6 px-6 py-4 border rounded-3xl h-32 text-lg"></textarea>
      <button onclick="createEtalase()" class="w-full bg-[#0033A0] text-white py-5 rounded-3xl font-bold text-xl">Buat & Publish Etalase</button>
      <button onclick="hideAdminPanel()" class="w-full mt-4 text-gray-500">Batal</button>
    </div>
  </div>

  <script>
    // ================== GANTI DENGAN MILIKMU ==================
    const SUPABASE_URL = 'https://NAMAPROJECTKAMU.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOi...'; // paste full anon key kamu
    const WA_ADMIN = '6281234567890'; // ganti nomor WA admin

    // Inisialisasi Supabase (SUDAH DI-FIX)
    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;
    let cart = [];

    async function checkAuth() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session) {
        currentUser = session.user;
        const { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', currentUser.id).single();
        document.getElementById('userName').innerHTML = `<i class="fa-solid fa-circle-user"></i> ${profile?.full_name || 'Gen Z'}`;
        if (profile?.role === 'admin') document.getElementById('adminBtn').classList.remove('hidden');
      }
    }

    async function loadEtalases() {
      const { data } = await supabaseClient.from('etalases').select('*');
      const grid = document.getElementById('etalaseGrid');
      grid.innerHTML = data?.map(e => `
        <div class="bg-white rounded-3xl overflow-hidden shadow-xl card-hover">
          <img src="${e.banner_url}" class="w-full h-48 object-cover">
          <div class="p-5">
            <h3 class="font-semibold text-xl">${e.name}</h3>
            <p class="text-gray-500 text-sm mt-1">${e.description}</p>
          </div>
        </div>
      `).join('') || '<p class="text-gray-400">Belum ada etalase</p>';
    }

    async function loadProducts(filter = '') {
      let query = supabaseClient.from('products').select('*');
      if (filter) query = query.eq('category', filter);
      const { data } = await query;
      
      // Isi kategori filter otomatis
      const categories = [...new Set(data?.map(p => p.category) || [])];
      const select = document.getElementById('categoryFilter');
      select.innerHTML = `<option value="">Semua Kategori</option>` + 
                        categories.map(cat => `<option value="${cat}">${cat}</option>`).join('');

      const grid = document.getElementById('productGrid');
      grid.innerHTML = data?.map(p => `
        <div class="bg-white rounded-3xl overflow-hidden shadow-xl card-hover">
          <img src="${p.image_url}" class="w-full h-56 object-cover">
          <div class="p-5">
            <h4 class="font-semibold text-lg">${p.name}</h4>
            <p class="text-gray-500 text-sm line-clamp-2">${p.description}</p>
            <div class="flex justify-between items-end mt-6">
              <span class="text-3xl font-bold text-[#CE1126]">Rp ${Number(p.price).toLocaleString('id-ID')}</span>
              <button onclick="addToCart(${p.id}, '${p.name}', ${p.price})" 
                      class="bg-[#0033A0] hover:bg-blue-800 text-white px-7 py-3 rounded-3xl text-sm font-medium">+ Keranjang</button>
            </div>
          </div>
        </div>
      `).join('') || '<p class="text-gray-400 col-span-full text-center">Belum ada produk</p>';
    }

    function addToCart(id, name, price) {
      const existing = cart.find(item => item.id === id);
      if (existing) existing.qty++;
      else cart.push({ id, name, price: Number(price), qty: 1 });
      updateCartCount();
      alert('✅ Berhasil ditambahkan ke keranjang!');
    }

    function updateCartCount() {
      document.getElementById('cartCount').textContent = cart.reduce((a, c) => a + c.qty, 0);
    }

    function toggleCart() {
      const modal = document.getElementById('cartModal');
      const container = document.getElementById('cartItems');
      let html = '';
      let total = 0;

      if (cart.length === 0) {
        html = `<p class="text-center text-gray-400 py-8">Keranjang masih kosong 🛒</p>`;
      } else {
        html = cart.map(item => {
          const subtotal = item.price * item.qty;
          total += subtotal;
          return `
            <div class="flex justify-between items-center border-b py-4">
              <div>
                <p class="font-medium">${item.name}</p>
                <p class="text-sm text-gray-500">${item.qty} × Rp ${item.price.toLocaleString('id-ID')}</p>
              </div>
              <p class="font-bold">Rp ${subtotal.toLocaleString('id-ID')}</p>
            </div>`;
        }).join('');
      }
      container.innerHTML = html;
      document.getElementById('cartTotal').textContent = `Rp ${total.toLocaleString('id-ID')}`;
      modal.classList.toggle('hidden');
    }

    function checkout() {
      if (cart.length === 0) return;
      alert('🎉 Terima kasih! Checkout simulasi berhasil (fitur payment bisa ditambah nanti)');
      cart = [];
      updateCartCount();
      toggleCart();
    }

    async function createEtalase() {
      if (!currentUser) return alert('Login dulu ya!');
      const name = document.getElementById('etalaseName').value.trim();
      const desc = document.getElementById('etalaseDesc').value.trim();
      if (!name) return alert('Nama etalase wajib diisi');

      const { error } = await supabaseClient.from('etalases').insert({
        name, description: desc, admin_id: currentUser.id, banner_url: 'https://picsum.photos/id/300/800/300'
      });
      if (!error) {
        alert('✅ Etalase berhasil dibuat!');
        hideAdminPanel();
        loadEtalases();
      } else alert('Gagal membuat etalase: ' + error.message);
    }

    function showAdminPanel() { document.getElementById('adminModal').classList.remove('hidden'); }
    function hideAdminPanel() { document.getElementById('adminModal').classList.add('hidden'); }

    function kirimAduanWhatsApp() {
      const text = encodeURIComponent('Halo Admin IndukShop 👋\nSaya ingin mengadukan:\n[ketik aduanmu di sini]');
      window.open(`https://wa.me/${WA_ADMIN}?text=${text}`, '_blank');
    }

    function showProfile() {
      alert('🔐 Login via Supabase sudah siap.\n\nKalau belum login, buka Supabase Auth di aplikasi kamu dulu.');
    }

    function filterProducts() {
      const cat = document.getElementById('categoryFilter').value;
      loadProducts(cat);
    }

    // Search real-time
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase().trim();
      if (!term) return loadProducts();
      // simple client-side filter (bisa di-upgrade nanti)
      loadProducts(); // refresh dulu
      setTimeout(() => {
        const products = document.querySelectorAll('#productGrid > div');
        products.forEach(div => {
          const title = div.querySelector('h4').textContent.toLowerCase();
          div.style.display = title.includes(term) ? 'block' : 'none';
        });
      }, 300);
    });

    // INIT
    window.onload = () => {
      checkAuth();
      loadEtalases();
      loadProducts();
    };
  </script>
</body>
</html>
